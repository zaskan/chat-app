# Use the internal registry URL so pulls never go to docker.io/library/demo-chat.
# (Short name demo-chat:latest requires ImageStream local lookup and still fails on some clusters.)
# After `oc start-build` creates the ImageStream, this path matches:
#   oc get is demo-chat -n demo-chat -o jsonpath='{.status.dockerImageRepository}'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-chat
  namespace: demo-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-chat
  template:
    metadata:
      labels:
        app: demo-chat
    spec:
      securityContext:
        # OpenShift restricted-v3 / Kubernetes 1.33+ user namespaces
        hostUsers: false
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-chat
          image: image-registry.openshift-image-registry.svc:5000/demo-chat/demo-chat:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              value: "sqlite:////data/chat.db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: demo-chat-secrets
                  key: jwt-secret
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-chat-sqlite
