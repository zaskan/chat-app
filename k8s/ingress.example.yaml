# Plain Kubernetes Ingress example (not used on OpenShift Route).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-chat
  namespace: demo-chat
spec:
  rules:
    - host: demo-chat.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-chat
                port:
                  number: 8000
